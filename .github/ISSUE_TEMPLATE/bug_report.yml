name: Bug Report
description: Report a bug in perp-cli
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: binary
    attributes:
      label: Affected binary
      options:
        - perp (CLI)
        - perp-mcp (MCP server)
        - Both
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command or MCP tool
      description: Which command or tool triggered the bug?
      placeholder: "e.g. perp trade buy BTC 0.01"
    validations:
      required: true

  - type: dropdown
    id: exchange
    attributes:
      label: Exchange
      options:
        - Pacifica
        - Hyperliquid
        - Lighter
        - Multiple / All
        - N/A
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: Network
      options:
        - Mainnet
        - Testnet
        - N/A
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / JSON output
      description: Paste relevant output. **Remove any private keys or secrets!**
      render: shell
    validations:
      required: false

  - type: dropdown
    id: json-mode
    attributes:
      label: Using --json flag?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: perp-cli version
      placeholder: "e.g. 0.3.1"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15.3, Ubuntu 24.04"
    validations:
      required: true
